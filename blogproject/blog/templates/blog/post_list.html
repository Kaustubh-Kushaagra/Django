<!DOCTYPE html>
<html>
<head>
    <title>My First blog web page</title>
    <style>
        .date{
            color:rgb(175, 2, 123);
        }
    </style>

</head>
<body>
    <h1>My blog</h1>
   
     {% for post in posts  %}
     <h2>
        <a href="{{ post.get_absolute_url }}">
        {{ post.title }}
        </a>
        </h2>
        <p class="date">
        Published {{ post.publish }} by {{ post.author }}
        </p>
       {{post.body|truncatewords:5|linebreaks}}
     
     {% endfor %}
</body>
</html>
